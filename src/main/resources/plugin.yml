name: Deepstone
version: $version
description: Le plugin c'est lié sur Les Nordique
main: fr.deepstonestudio.deepstone.Deepstone
api-version: '1.21'
website: https://deep.deespstone.fr
authors:
  - Deepstone-Studio
  - metal54400_
depend:
  - ChestShop
  - GriefPrevention

softdepend:
  - PlaceholderAPI
  - Essentials
  - Vault

commands:
  aelle:
    description: Spawn Ælle et déclenche la narration
    permission: deepstone.event.ragnardeath

  invbackup:
    description: Gestion des backups inventaires
    usage: /invbackup restore <joueur> <date>

  ragnardeath:
    description: Event La Mort de Ragnar (narration + mobs buff)
    usage: /ragnardeath <start|stop|status>
    permission: deepstone.event.ragnardeath

  saga:
    description: Raconte la saga de Ragnar et de ses proches
    usage: /saga [start|next|prev|chapter|reset]
    permission: deepstone.saga

  tips:
    description: Active/Désactive les messages d'aide automatiques.
    usage: /tips | /tips reload

  mercenary:
    description: Mercenary commands
    usage: /mercenary help

  priere:
    description: Prier les dieux nordiques
    usage: /priere <thor|odin|loki|freya|frey>

  war:
    description: Système de guerre

  clan:
    description: Gestion des clans Deepstone
    usage: /clan help

  clearlag:
    description: Force le nettoyage des items au sol
    usage: /clearlag

permissions:
  deepstone.invbackup.restore:
    default: op

  deepstone.event.ragnardeath:
    description: Lancer / arrêter l'event RagnarDeath
    default: op

  deepstone.saga:
    default: true

  deepstone.tips:
    default: true

  deepstone.tips.reload:
    default: op

  deepstone.admin:
    default: op

  deepstone.priere.admin:
    default: op

  deepstone.clan.admin:
    description: Gestion des clans Deepstone
    default: op

  deepstone.clearlag:
    description: Autorise /clearlag
    default: op

  deepstone.pl:
    description: Autorise l'utilisation de /pl
    default: op

  deepstone.afk.bypass:
    description: Ne passe jamais AFK via DeepstoneAFK (mode sans Essentials).
    default: op

  deepstone.afk.kickexempt:
    description: Immunisé contre l'auto-kick AFK via DeepstoneAFK (mode sans Essentials).
    default: op

  deepstone.rembourse:
    description: Permissions modérateur
    default: op

