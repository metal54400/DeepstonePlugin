# =====================================================
#                    Deepstone
# =====================================================
# Configuration principale du plugin
# =====================================================


# =====================================================
#                CLEAR LAG / ITEMS
# =====================================================

# Intervalle entre chaque nettoyage (en secondes)
interval-seconds: 300

# Messages d’avertissement avant le nettoyage
warnings:
  - time: 60
    message: "&7[&c!&7] Nettoyage des items dans &c60 &7secondes !"
  - time: 10
    message: "&7[&c!&7] Nettoyage des items dans &c10 &7secondes !"

# Message après le nettoyage
# {count} = nombre d’items supprimés
done-message: "&7[&e?&7] &a{count} &aitems ont été supprimés."


# =====================================================
#                      AFK
# =====================================================

afk:
  # Temps avant de passer AFK (en secondes)
  # -1 = désactiver l’AFK automatique
  auto-afk: 300

  # Temps avant kick une fois AFK (en secondes)
  # -1 = désactiver le kick AFK
  auto-afk-kick: 1200

  # Message de kick AFK
  kick-message: "&7[&c!&7] &cKick : AFK trop longtemps."

  # Annulation du statut AFK
  cancel-on-move: true
  cancel-on-chat: true
  cancel-on-interact: true

  # Messages AFK
  messages:
    enabled: true

    # true = message à tout le serveur
    # false = message uniquement au joueur
    broadcast: true

    # {PLAYER} = nom du joueur
    now-afk: "&e{PLAYER} &7est maintenant &7[AFK]"
    no-longer-afk: "&e{PLAYER} &7n'est plus AFK"

  # Suffix affiché dans le TAB (via PlaceholderAPI)
  suffix: "&7[&9AFK]"


# =====================================================
#                CREATIVE / ITEMS
# =====================================================

# Ajoute un lore automatiquement sur les items pris en créatif
addLoreOnCreative: true

# Lore ajouté
# {staff} = nom du membre du staff
loreitem: "&7Remboursé par &b{staff}"

season:
  enabled: true
  length-days: 30
  run-hour: 12        # heure locale serveur
  run-minute: 0
  reset-player-glory: true

rewards:
  top1:
    - "eco give %king% 500"
    - "crates key give floki_key 2"
  top2:
    - "give %king% diamond 16"
  top3:
    - "give %king% emerald 32"

discord:
  enabled: true
  webhook-url: "https://discord.com/api/webhooks/1471593171044536404/jmRM7c76YpYDybd8gY8zRs4jdWeV24x4nCN-SqePLrTP__8yG5VSimIzpSlMcgyTSCPE"
  mention-role-id: "1397967686410961026"   # optionnel, ex: "1234567890"

villager-trade-limiter:
  enabled: false

  enchanted-book:
    enabled: false
    cooldown-seconds: 3600
    message: "§7[§e?§7] Vous devez attendre avant d'acheter un autre livre enchanté !"

  max-uses:
    enabled: true
    diamond-items-max-uses: 1
    cheap-items-max-uses: 5

trade-hours:
  enabled: false

  # Heures Minecraft (0-23). Exemple: 7 = 07h, 19 = 19h
  start-hour: 7
  end-hour: 19

  # Si true => Msg.broadcast(), sinon message uniquement au joueur
  broadcast: true

  message: "&7[§e?&7] Les échanges avec les villageois sont autorisés uniquement de &d%start%h&7 à &b%end%h&7."

runes:
  enabled: true

  # Placement selon claims (GriefPrevention)
  griefprevention:
    block-admin-claims: true
    block-player-claims: false

  # Uniquement si le mob est tué par un joueur
  require-player-kill: true

  # Si true => seulement les mobs hostiles (Monster)
  only-hostile-mobs: true

  # Style des runes
  radius: 15
  ring-thickness: 1
  spokes: 8
  material: REDSTONE_WIRE

  # Despawn en secondes (ex: 300 = 5 min)
  despawn-seconds: 300

claim-actionbar:
  enabled: true
  protected-message: "&aZone Protégé"
  unprotected-message: "&cZone non protégé"

zombie-villager-boost:
  enabled: true
  extra-chance-percent: 5.0   # +5%
  only-natural-spawns: true   # uniquement NATURAL/CHUNK_GEN (recommandé)

protection:
  duration-seconds: 300
  cleanup-interval-seconds: 60
  message-enabled: true
  message: "§7[§e?§7] §aProtection anti-TPKill activée pendant {minutes} minutes ({seconds}s)."

decapitation:
  enabled: true
  mark-duration-seconds: 10
  mark-cooldown-seconds: 2
  drop-chance-percent: 15
  require-sneak: true
  require-axe: true
  only-villager-types: true

raid:
  enabled: true
  cooldown-seconds: 3600  # 1 heure
  reward:
    material: TOTEM_OF_UNDYING
    amount: 2
  message-cooldown: "§7[§e?§7] Vous devez attendre encore §6{minutes}§7 minutes (§6{seconds}§7s) avant un nouveau raid."
  message-reward: "§7[§e?§7] §aRécompense de raid reçue: §e{amount}x {item}§7."

mob-heads:
  enabled: true
  chance-percent: 5
  require-sneak: false
  require-axe: false

updater:
  enabled: true
  check-on-start: true
  check-interval-minutes: 60
  notify-permission: "deepstone.admin"
  github:
    owner: "DeepstoneStudio"
    repo: "DeepstonePlugin"
    # optionnel : si tu veux forcer un nom d'asset spécifique (sinon: prend le 1er .jar)
    asset-name: ""

inv-sync:
  enabled: true

  # Ce que tu veux synchroniser
  sync-armor: true
  sync-offhand: true
  sync-enderchest: false
  sync-xp: true
  sync-health-food: false

  # Anti-duplication
  swap-lock-ticks: 8   # durée de blocage actions (drop/pickup/click) pendant le swap
  autosave-seconds: 120

tips:
  enabled: true
  interval-seconds: 300
  prefix: "&f[Server] &7[&e?&7] "
  random: true
  messages:
    - "&7Utilise &e/menu &7pour accéder aux fonctionnalités principales."
    - "Vous pouvez faire /quest pour gagner des Points de vote de l'argent des block de claim en effectuent des quête"
    - "Faites /voteshop ou /votes pour acheter avec vos point de votes des clé"
    - "&7L'End est ouvert ! &d/warp end"
    - "&7Vends tes items aux joueurs avec &6/ah"
    - "&7Besoin d'argent ? Utilise &a/sellgui &7pour te faire de l'argents"
    - "&7Rejoins un clan et gagne de la gloire !"
    - "&7N'oublie pas de voter : &bhttps://deep.deepstone.fr/vote"
    - "Si vous voulez l'histoire vrai de Ragnar et les Ragnarson faites /saga start"
    - "Si vous voulez achetez un grades avec de la vrai argent aller sur &bhttps://deep.deepstone.fr/shop/categories/1"
    - "Pour achetez un grades INGAME allez dans /shop puis allez dans categories Grades et pouvez acheter des grades avec de l'argent ingame"
    - "Pour changer de &aSkin&7 faites /skin set url ou nom d'un joueur premium"
    - "Petite information &7[&c!&7] Le Tpkill est &cinterdit&7 sur le server "

ragnardeath:
  random-enabled: true
  # chance par "jour minecraft" (24000 ticks)
  random-chance-percent: 15

  # sur quels mondes l'event peut pop (vide = monde où le scheduler tourne)
  worlds:
    - world

  # sécurité : ne pas relancer si déjà en cours
  cooldown-days: 0  # 0 = pas de cooldown, sinon nombre de jours MC à attendre après un event